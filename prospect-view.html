<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRM - Fiche prospect</title>

    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-header="retour">

<!-- HEADER dynamique -->
<div id="header"></div>

<!-- LAYOUT -->
<div class="container">
    <div class="row">

        <!-- CONTENU PRINCIPAL -->
        <main class="col-12 col-md-9">
            <h1 class="mb-4">Fiche prospect</h1>

            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="card-title mb-3" id="view-nom-complet"></h4>

                    <p><strong>Adresse :</strong> <span id="view-adresse"></span></p>
                    <p><strong>Ville :</strong> <span id="view-ville"></span></p>
                    <p><strong>Code postal :</strong> <span id="view-cp"></span></p>
                    <p><strong>Téléphone :</strong> <span id="view-tel"></span></p>
                    <p><strong>Email :</strong> <span id="view-email"></span></p>
                    <p><strong>Nombre d'employés :</strong> <span id="view-employes"></span></p>
                    <p><strong>Chiffre d'affaires :</strong> <span id="view-ca"></span> €</p>
                    <p><strong>Intérêt :</strong> <span id="view-interesse"></span></p>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="prospects-list.html" class="btn btn-secondary">Retour</a>
                        <button class="btn btn-warning" id="btn-modifier">Modifier</button>
                    </div>

                </div>
            </div>
        </main>

        <!-- ASIDE (desktop uniquement) -->
        <div id="aside" class="col-md-3 d-none d-md-block"></div>

    </div>
</div>

<!-- FOOTER dynamique -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="template.js"></script>
<script><link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Récupération des données depuis le localStorage
    const prospectData = localStorage.getItem('prospectAVoir');

    if (prospectData) {
        const prospect = JSON.parse(prospectData);

        document.getElementById('view-nom-complet').textContent = prospect.nom + ' ' + prospect.prenom;
        document.getElementById('view-adresse').textContent = prospect.adresse;
        document.getElementById('view-ville').textContent = prospect.ville;
        document.getElementById('view-cp').textContent = prospect.codePostal;
        document.getElementById('view-tel').textContent = prospect.telephone;
        document.getElementById('view-email').textContent = prospect.email;
        document.getElementById('view-employes').textContent = prospect.nbEmployes;
        document.getElementById('view-ca').textContent = prospect.chiffreAffaires;
        document.getElementById('view-interesse').textContent = prospect.interesse;

        // Bouton modifier depuis la fiche
        document.getElementById('btn-modifier').addEventListener('click', function () {
            localStorage.setItem('prospectAModifier', JSON.stringify(prospect));
            window.location.href = 'prospect-form.html';
        });

    } else {
        // Si on arrive ici sans données, on redirige vers la liste
        window.location.href = 'prospects-list.html';
    }
</script>

</body>
</html>
