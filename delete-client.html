<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRM - Supprimer un client</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-header="retour">

<!-- HEADER dynamique -->
<div id="header"></div>

<!-- LAYOUT -->
<div class="container">
    <div class="row">

        <!-- CONTENU PRINCIPAL -->
        <main class="col-12 col-md-9">
            <h1 class="mb-4">Supprimer un client</h1>

            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="card-title mb-3">Voulez-vous vraiment supprimer ce client ?</h4>

                    <p><strong>Nom :</strong> <span id="delete-nom"></span></p>
                    <p><strong>Ville :</strong> <span id="delete-ville"></span></p>
                    <p><strong>Téléphone :</strong> <span id="delete-tel"></span></p>

                    <div class="alert alert-danger mt-4">
                        Cette action est irréversible.
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="clients-list.html" class="btn btn-secondary">Annuler</a>
                        <button class="btn btn-danger" id="btn-supprimer">Supprimer définitivement</button>
                    </div>

                </div>
            </div>
        </main>

        <!-- ASIDE (desktop uniquement) -->
        <div id="aside" class="col-md-3 d-none d-md-block"></div>

    </div>
</div>

<!-- FOOTER dynamique -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="template.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {

        const clientData = localStorage.getItem('clientASupprimer');

        if (clientData) {
            const client = JSON.parse(clientData);

            document.getElementById('delete-nom').textContent = client.nom + ' ' + client.prenom;
            document.getElementById('delete-ville').textContent = client.ville;
            document.getElementById('delete-tel').textContent = client.telephone;

            document.getElementById('btn-supprimer').addEventListener('click', function () {
                // TODO : appel API suppression backend JakartaEE
                localStorage.removeItem('clientASupprimer');
                alert('Client supprimé ! (suppression serveur à connecter)');
                window.location.href = 'clients-list.html';
            });

        } else {
            // Si on arrive ici sans données, on redirige vers la liste
            window.location.href = 'clients-list.html';
        }

    });
</script>

</body>
</html>
