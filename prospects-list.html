<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRM - Liste des prospects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-header="retour">

<!-- HEADER dynamique -->
<div id="header"></div>

<!-- LAYOUT -->
<div class="container">
    <div class="row">

        <!-- CONTENU PRINCIPAL -->
        <main class="col-12 col-md-9">
            <h1 class="mb-4">Liste des prospects</h1>

            <div class="d-flex justify-content-end mb-3">
                <a class="btn btn-success" href="prospect-form.html" onclick="localStorage.removeItem('prospectAModifier')">Ajouter un prospect</a>
            </div>

            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Nom</th>
                        <th>Ville</th>
                        <th>Téléphone</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>

                    <tr>
                        <td>Bernard</td>
                        <td>Marseille</td>
                        <td>06 22 33 44 55</td>
                        <td class="text-end">
                            <button class="btn btn-primary btn-sm" onclick="voirProspect('Bernard', 'Sophie', '45 avenue du Port', 'Marseille', '13000', '06 22 33 44 55', 'sophie.bernard@example.com', '10', '50000', 'OUI')">Voir</button>
                            <button class="btn btn-warning btn-sm" onclick="modifierProspect('Bernard', 'Sophie', '45 avenue du Port', 'Marseille', '13000', '06 22 33 44 55', 'sophie.bernard@example.com', '10', '50000', 'OUI')">Modifier</button>
                            <a class="btn btn-danger btn-sm" href="delete-prospect.html">Supprimer</a>
                        </td>
                    </tr>

                    <tr>
                        <td>Lefèvre</td>
                        <td>Bordeaux</td>
                        <td>07 55 66 77 88</td>
                        <td class="text-end">
                            <button class="btn btn-primary btn-sm" onclick="voirProspect('Lefèvre', 'Thomas', '8 rue du Château', 'Bordeaux', '33000', '07 55 66 77 88', 'thomas.lefevre@example.com', '25', '120000', 'NON')">Voir</button>
                            <button class="btn btn-warning btn-sm" onclick="modifierProspect('Lefèvre', 'Thomas', '8 rue du Château', 'Bordeaux', '33000', '07 55 66 77 88', 'thomas.lefevre@example.com', '25', '120000', 'NON')">Modifier</button>
                            <a class="btn btn-danger btn-sm" href="delete-prospect.html">Supprimer</a>
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>
        </main>

        <!-- ASIDE (desktop uniquement) -->
        <div id="aside" class="col-md-3 d-none d-md-block"></div>

    </div>
</div>

<!-- FOOTER dynamique -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="template.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function voirProspect(nom, prenom, adresse, ville, codePostal, telephone, email, nbEmployes, chiffreAffaires, interesse) {
        localStorage.setItem('prospectAVoir', JSON.stringify({
            nom, prenom, adresse, ville, codePostal, telephone, email, nbEmployes, chiffreAffaires, interesse
        }));
        window.location.href = 'prospect-view.html';
    }

    function modifierProspect(nom, prenom, adresse, ville, codePostal, telephone, email, nbEmployes, chiffreAffaires, interesse) {
        localStorage.setItem('prospectAModifier', JSON.stringify({
            nom, prenom, adresse, ville, codePostal, telephone, email, nbEmployes, chiffreAffaires, interesse
        }));
        window.location.href = 'prospect-form.html';
    }
</script>

</body>
</html>
