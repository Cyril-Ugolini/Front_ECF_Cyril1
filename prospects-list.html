                            <button class="btn btn-primary btn-sm btn-voir" onclick="voirProspect('Rousseau', 'Emma', '12 rue Faidherbe', 'Lille', '59000', '06 33 44 55 66', 'emma.rousseau@example.com', '5', '30000', 'OUI')">Voir</button>

<!-- SCRIPTS -->
<script src="template.js"></script>
<script><link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {

        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

        // Lecture du mode dans l'URL
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');

        // Masquer le bouton Ajouter si non connecté
        if (!isLoggedIn) {
            document.getElementById('btn-ajouter').classList.add('d-none');
        }

        // Masquer immédiatement les boutons selon connexion et mode
        if (!isLoggedIn) {
            document.querySelectorAll('.btn-modifier, .btn-supprimer').forEach(btn => btn.classList.add('d-none'));
        } else if (mode === 'modifier') {
            document.getElementById('titre-liste').textContent = 'Quel prospect souhaitez-vous modifier ?';
            document.querySelectorAll('.btn-supprimer').forEach(btn => btn.classList.add('d-none'));
        } else if (mode === 'supprimer') {
            document.getElementById('titre-liste').textContent = 'Quel prospect souhaitez-vous supprimer ?';
            document.querySelectorAll('.btn-modifier').forEach(btn => btn.classList.add('d-none'));
        }

        window.voirProspect = function (nom, prenom, adresse, ville, codePostal, telephone, email, nbEmployes, chiffreAffaires, interesse) {
            localStorage.setItem('prospectAVoir', JSON.stringify({
                nom, prenom, adresse, ville, codePostal, telephone, email, nbEmployes, chiffreAffaires, interesse
            }));
            window.location.href = 'prospect-view.html';
        };

        window.modifierProspect = function (nom, prenom, adresse, ville, codePostal, telephone, email, nbEmployes, chiffreAffaires, interesse) {
            localStorage.setItem('prospectAModifier', JSON.stringify({
                nom, prenom, adresse, ville, codePostal, telephone, email, nbEmployes, chiffreAffaires, interesse
            }));
            window.location.href = 'prospect-form.html';
        };

        window.supprimerProspect = function (nom, prenom, ville, telephone) {
            localStorage.setItem('prospectASupprimer', JSON.stringify({
                nom, prenom, ville, telephone
            }));
            window.location.href = 'delete-prospect.html';
        };

    });
</script>

</body>
</html>
