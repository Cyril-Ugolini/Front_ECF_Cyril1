<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRM - Liste des clients</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-header="retour">

<!-- HEADER dynamique -->
<div id="header"></div>

<!-- LAYOUT -->
<div class="container">
    <div class="row">

        <!-- CONTENU PRINCIPAL -->
        <main class="col-12 col-md-9">
            <h1 class="mb-4" id="titre-liste">Liste des clients</h1>

            <div class="d-flex justify-content-end mb-3">
                <a class="btn btn-success" href="client-form.html" onclick="localStorage.removeItem('clientAModifier')">Ajouter un client</a>
            </div>

            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Nom</th>
                        <th>Ville</th>
                        <th>Téléphone</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>

                    <tr>
                        <td>Durand</td>
                        <td>Paris</td>
                        <td>06 00 00 00 00</td>
                        <td class="text-end">
                            <button class="btn btn-primary btn-sm btn-voir" onclick="voirClient('Durand', 'Jean', '12 rue de Paris', 'Paris', '75000', '06 00 00 00 00', 'jean.durand@example.com', '0')">Voir</button>
                            <button class="btn btn-warning btn-sm btn-modifier" onclick="modifierClient('Durand', 'Jean', '12 rue de Paris', 'Paris', '75000', '06 00 00 00 00', 'jean.durand@example.com', '0')">Modifier</button>
                            <button class="btn btn-danger btn-sm btn-supprimer" onclick="supprimerClient('Durand', 'Jean', 'Paris', '06 00 00 00 00')">Supprimer</button>
                        </td>
                    </tr>

                    <tr>
                        <td>Martin</td>
                        <td>Lyon</td>
                        <td>07 11 22 33 44</td>
                        <td class="text-end">
                            <button class="btn btn-primary btn-sm btn-voir" onclick="voirClient('Martin', 'Sophie', '5 rue de la République', 'Lyon', '69000', '07 11 22 33 44', 'sophie.martin@example.com', '0')">Voir</button>
                            <button class="btn btn-warning btn-sm btn-modifier" onclick="modifierClient('Martin', 'Sophie', '5 rue de la République', 'Lyon', '69000', '07 11 22 33 44', 'sophie.martin@example.com', '0')">Modifier</button>
                            <button class="btn btn-danger btn-sm btn-supprimer" onclick="supprimerClient('Martin', 'Sophie', 'Lyon', '07 11 22 33 44')">Supprimer</button>
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>
        </main>

        <!-- ASIDE (visible seulement sur desktop) -->
        <div id="aside" class="col-md-3 d-none d-md-block"></div>

    </div>
</div>

<!-- FOOTER dynamique -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="template.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {

        // Lecture du mode dans l'URL
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');

        // Adaptation du titre et des boutons selon le mode
        if (mode === 'modifier') {
            document.getElementById('titre-liste').textContent = 'Quel client souhaitez-vous modifier ?';
            document.querySelectorAll('.btn-supprimer').forEach(btn => btn.classList.add('d-none'));
        } else if (mode === 'supprimer') {
            document.getElementById('titre-liste').textContent = 'Quel client souhaitez-vous supprimer ?';
            document.querySelectorAll('.btn-modifier').forEach(btn => btn.classList.add('d-none'));
        }

        // Fonctions
        window.voirClient = function (nom, prenom, adresse, ville, codePostal, telephone, email, chiffreAffaires) {
            localStorage.setItem('clientAVoir', JSON.stringify({
                nom, prenom, adresse, ville, codePostal, telephone, email, chiffreAffaires
            }));
            window.location.href = 'client-view.html';
        };

        window.modifierClient = function (nom, prenom, adresse, ville, codePostal, telephone, email, chiffreAffaires) {
            localStorage.setItem('clientAModifier', JSON.stringify({
                nom, prenom, adresse, ville, codePostal, telephone, email, chiffreAffaires
            }));
            window.location.href = 'client-form.html';
        };

        window.supprimerClient = function (nom, prenom, ville, telephone) {
            localStorage.setItem('clientASupprimer', JSON.stringify({
                nom, prenom, ville, telephone
            }));
            window.location.href = 'delete-client.html';
        };

    });
</script>

</body>
</html>
