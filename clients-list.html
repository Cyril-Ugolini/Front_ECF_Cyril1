                            ('Martin', 'Sophie', '5 rue de la République', 'Lyon', '69000', '07 11 22 33 44', 'sophie.martin@example.com', '80000')">Modifier</button>
                            <button class="btn btn-danger btn-sm btn-supprimer" onclick="supprimerClient
                            ('Martin', 'Sophie', 'Lyon', '07 11 22 33 44')">Supprimer</button>
                        </td>
                    </tr>

                    <tr>
                        <td>Petit</td>
                        <td>Toulouse</td>
                        <td>06 33 44 55 66</td>
                        <td class="text-end">
                            <button class="btn btn-primary btn-sm btn-voir" onclick="voirClient
                            ('Petit', 'Marc', '3 allée des Violettes', 'Toulouse', '31000', '06 33 44 55 66', 'marc.petit@example.com', '200000')">Voir</button>
                            <button class="btn btn-warning btn-sm btn-modifier" onclick="modifierClient
                            ('Petit', 'Marc', '3 allée des Violettes', 'Toulouse', '31000', '06 33 44 55 66', 'marc.petit@example.com', '200000')">Modifier</button>
                            <button class="btn btn-danger btn-sm btn-supprimer" onclick="supprimerClient

                    </tr>

                    <tr>
                        <td>Moreau</td>

                    <tr>

                        <td>06 55 66 77 88</td>

<!-- FOOTER dynamique -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="template.js"></script>
<script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {

        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

        // Lecture du mode dans l'URL
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');

        // Masquer le bouton Ajouter si non connecté
        if (!isLoggedIn) {
            document.getElementById('btn-ajouter').classList.add('d-none');
        }

        // Masquer immédiatement les boutons selon connexion et mode
        if (!isLoggedIn) {
            document.querySelectorAll('.btn-modifier, .btn-supprimer').forEach(btn => btn.classList.add('d-none'));
        } else if (mode === 'modifier') {
            document.getElementById('titre-liste').textContent = 'Quel client souhaitez-vous modifier ?';
            document.querySelectorAll('.btn-supprimer').forEach(btn => btn.classList.add('d-none'));
        } else if (mode === 'supprimer') {
            document.getElementById('titre-liste').textContent = 'Quel client souhaitez-vous supprimer ?';
            document.querySelectorAll('.btn-modifier').forEach(btn => btn.classList.add('d-none'));
        }

        window.voirClient = function (nom, prenom, adresse, ville, codePostal, telephone, email, chiffreAffaires) {
            localStorage.setItem('clientAVoir', JSON.stringify({
                nom, prenom, adresse, ville, codePostal, telephone, email, chiffreAffaires
            }));
            window.location.href = 'client-view.html';
        };

        window.modifierClient = function (nom, prenom, adresse, ville, codePostal, telephone, email, chiffreAffaires) {
            localStorage.setItem('clientAModifier', JSON.stringify({
                nom, prenom, adresse, ville, codePostal, telephone, email, chiffreAffaires
            }));
            window.location.href = 'client-form.html';
        };

        window.supprimerClient = function (nom, prenom, ville, telephone) {
            localStorage.setItem('clientASupprimer', JSON.stringify({
                nom, prenom, ville, telephone
            }));
            window.location.href = 'delete-client.html';
        };

    });
</script>

</body>
</html>
